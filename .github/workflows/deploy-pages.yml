name: Deploy Smart Campus DX prototype

on:
  push:
    branches: ["pink-style"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Checkout pink-style
        uses: actions/checkout@v4
        with:
          ref: pink-style
          path: pink-style-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build main
        working-directory: main-src
        run: |
          npm install
          npm run build

      - name: Install & build pink-style
        working-directory: pink-style-src
        run: |
          npm install
          npm run build -- --base=/smart-campus-dx-prototype/pink-style/

      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r main-src/dist/. combined/
          mkdir -p combined/pink-style
          cp -r pink-style-src/dist/. combined/pink-style/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
